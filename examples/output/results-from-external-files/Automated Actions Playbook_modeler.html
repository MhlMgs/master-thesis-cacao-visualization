<!doctype html>
<html lang="en">
<head>

  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; background: #f7f7f8; }
    .toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 12px; background: #ffffff; border-bottom: 1px solid #ddd;

    .toolbar button {
      border: 1px solid #ccc; background: #fff; border-radius: 8px; padding: 7px 10px; cursor: pointer;

    .toolbar button:hover { background: #f4f6fb; }

    .toolbar .hint { color: #555; font-size: 13px; }
    #canvas { width: 100%; height: 100%; background: #fcfcfd; }
    .error { color: #b00020; font-size: 13px; margin-left: 8px; }
  </style>
</head>

point x=\"226\" y=\"650\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_0\" bpmnElement=\"Flow_0106d1eba6a747d9a0bad909c00435a7\">\n        <di:waypoint x=\"1100\" y=\"315\" />\n        <di:waypoint x=\"1124\" y=\"315\" />\n        <di:waypoint x=\"1124\" y=\"141\" />\n        <di:waypoint x=\"1196\" y=\"141\" />\n        <di:waypoint x=\"1196\" y=\"138\" />\n        <di:waypoint x=\"1220\" y=\"138\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_1\" bpmnElement=\"Flow_393a039ca3e742e8b73439d2295713b8\">\n        <di:waypoint x=\"710\" y=\"145\" />\n        <di:waypoint x=\"734\" y=\"145\" />\n        <di:waypoint x=\"734\" y=\"240\" />\n        <di:waypoint x=\"916\" y=\"240\" />\n        <di:waypoint x=\"916\" y=\"315\" />\n        <di:waypoint x=\"940\" y=\"315\" />\n        <bpmndi:BPMNLabel>\n          <dc:Bounds x=\"912\" y=\"346\" width=\"46\" height=\"22\" />\n        </bpmndi:BPMNLabel>\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_2\" bpmnElement=\"Flow_1e0dedbc2cfa4ea5853b9d05a269a8d6\">\n        <di:waypoint x=\"710\" y=\"133\" />\n        <di:waypoint x=\"734\" y=\"133\" />\n        <di:waypoint x=\"734\" y=\"141\" />\n        <di:waypoint x=\"916\" y=\"141\" />\n        <di:waypoint x=\"916\" y=\"138\" />\n        <di:waypoint x=\"940\" y=\"138\" />\n        <bpmndi:BPMNLabel>\n          <dc:Bounds x=\"908\" y=\"85\" width=\"54\" height=\"22\" />\n        </bpmndi:BPMNLabel>\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_3\" bpmnElement=\"Flow_958edaf46d5b4bbdb22aa8d1e0cfe051\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"155\" />\n        <di:waypoint x=\"636\" y=\"155\" />\n        <di:waypoint x=\"636\" y=\"145\" />\n        <di:waypoint x=\"660\" y=\"145\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_4\" bpmnElement=\"Flow_3594d15ffa554e488ac0f471cfb30e35\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"155\" />\n        <di:waypoint x=\"356\" y=\"155\" />\n        <di:waypoint x=\"356\" y=\"165\" />\n        <di:waypoint x=\"380\" y=\"165\" />\n      </bpmndi:BPMNEdge>\n    </bpmndi:BPMNPlane>\n  </bpmndi:BPMNDiagram>\n</bpmn:definitions>";
    const titleText = "Automated Actions Playbook.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
</body>
