<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>powershell-playbook.bpmn</title>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/diagram-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-font/css/bpmn-embedded.css">
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; background: #f7f7f8; }
    .toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 12px; background: #ffffff; border-bottom: 1px solid #ddd;
    }
    .toolbar button {
      border: 1px solid #ccc; background: #fff; border-radius: 8px; padding: 7px 10px; cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #f4f6fb; }
    .toolbar .grow { flex: 1; }
    .toolbar .title { font-weight: 600; color: #223; }
    .toolbar .hint { color: #555; font-size: 13px; }
    #canvas { width: 100%; height: 100%; background: #fcfcfd; }
    .error { color: #b00020; font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="title"></div>
    <button id="fitBtn">Fit</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="resetBtn">100%</button>
    <button id="handBtn">Hand tool</button>
    <button id="saveXmlBtn">Download BPMN</button>
    <button id="saveSvgBtn">Download SVG</button>
    <div class="grow"></div>
    <span class="hint">Drag, move and edit elements if needed.</span>
    <span id="error" class="error"></span>
  </div>
  <div id="canvas"></div>

  <script src="https://unpkg.com/bpmn-js@18/dist/bpmn-modeler.production.min.js"></script>

pv4\": [\"192.168.1.2\"]}</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_cc34d08333684828948d57b8dd3be453\" sourceRef=\"Task_action_010b0420_db3e_4810_ba75_08a10f473214\" targetRef=\"TextAnnotation_7060f45aa4f84364a98bf48de7d8f8c8\" />\n  </bpmn:process>\n  <bpmndi:BPMNDiagram id=\"BPMNDiagram_1\">\n    <bpmndi:BPMNPlane id=\"BPMNPlane_1\" bpmnElement=\"Process_playbook_6673b5cb-d9e9-408e-ab50-2fbb9abe91f5\">\n      <bpmndi:BPMNShape id=\"BPMNShape_0\" bpmnElement=\"StartEvent_start_baccd71d_5a22_4999_8cba_ff3d634971fa\">\n        <dc:Bounds x=\"100\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_1\" bpmnElement=\"Task_action_010b0420_db3e_4810_ba75_08a10f473214\">\n        <dc:Bounds x=\"380\" y=\"120\" width=\"160\" height=\"90\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_2\" bpmnElement=\"EndEvent_end_28cd6cb6_b0e5_4445_8e4b_dfa9e0eab79a\">\n        <dc:Bounds x=\"660\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_8c16d0d9292c4c5e847c5e29de75a3ba\" bpmnElement=\"TextAnnotation_8c16d0d9292c4c5e847c5e29de75a3ba\">\n        <dc:Bounds x=\"226\" y=\"224\" width=\"740\" height=\"138\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_8f4704f2f90b4ebf97b7a279b6a70111\" bpmnElement=\"Association_8f4704f2f90b4ebf97b7a279b6a70111\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"293\" />\n        <di:waypoint x=\"226\" y=\"293\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_7060f45aa4f84364a98bf48de7d8f8c8\" bpmnElement=\"TextAnnotation_7060f45aa4f84364a98bf48de7d8f8c8\">\n        <dc:Bounds x=\"780\" y=\"120\" width=\"460\" height=\"84\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_cc34d08333684828948d57b8dd3be453\" bpmnElement=\"Association_cc34d08333684828948d57b8dd3be453\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"162\" />\n        <di:waypoint x=\"780\" y=\"162\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_0\" bpmnElement=\"Flow_06ec2bad6395494ab58936cb47fb01b4\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"138\" />\n        <di:waypoint x=\"660\" y=\"138\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_1\" bpmnElement=\"Flow_9835eba0434345f49dd48cd1dd8501db\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"165\" />\n        <di:waypoint x=\"380\" y=\"165\" />\n      </bpmndi:BPMNEdge>\n    </bpmndi:BPMNPlane>\n  </bpmndi:BPMNDiagram>\n</bpmn:definitions>";
    const titleText = "powershell-playbook.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
</body>
</html>
