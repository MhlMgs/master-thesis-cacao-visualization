<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>spec-3.1-example.bpmn</title>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/diagram-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-font/css/bpmn-embedded.css">
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; background: #f7f7f8; }
    .toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 12px; background: #ffffff; border-bottom: 1px solid #ddd;
    }
    .toolbar button {
      border: 1px solid #ccc; background: #fff; border-radius: 8px; padding: 7px 10px; cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #f4f6fb; }
    .toolbar .grow { flex: 1; }
    .toolbar .title { font-weight: 600; color: #223; }
    .toolbar .hint { color: #555; font-size: 13px; }
    #canvas { width: 100%; height: 100%; background: #fcfcfd; }
    .error { color: #b00020; font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="title"></div>
    <button id="fitBtn">Fit</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="resetBtn">100%</button>
    <button id="handBtn">Hand tool</button>
    <button id="saveXmlBtn">Download BPMN</button>
    <button id="saveSvgBtn">Download SVG</button>
    <div class="grow"></div>
    <span class="hint">Drag, move and edit elements if needed.</span>
    <span id="error" class="error"></span>
  </div>
  <div id="canvas"></div>

  <script src="https://unpkg.com/bpmn-js@18/dist/bpmn-modeler.production.min.js"></script>
  <script>
    const initialXml = "<?xml version='1.0' encoding='utf-8'?>\n<bpmn:definitions xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\" xmlns:cacao=\"https://example.org/cacao-bpmn/extensions\" xmlns:dc=\"http://www.omg.org/spec/DD/20100524/DC\" xmlns:di=\"http://www.omg.org/spec/DD/20100524/DI\" id=\"Definitions_c7695470-1b40-4c24-9e72-768c77be1c2f\" targetNamespace=\"https://example.org/cacao-bpmn\">\n  <bpmn:process id=\"Process_playbook_61a6c41e-6efc-4516-a242-dfbc5c89d562\" name=\"Find Malware FuzzyPanda\" isExecutable=\"false\">\n    <bpmn:extensionElements>\n      <cacao:property name=\"playbook_id\" value=\"playbook--61a6c41e-6efc-4516-a242-dfbc5c89d562\" />\n      <cacao:property name=\"spec_version\" value=\"cacao-2.0\" />\n      <cacao:property name=\"playbook_types\" value=\"[&quot;investigation&quot;]\" />\n      <cacao:property name=\"playbook_activities\" value=\"[&quot;analyze-collected-data&quot;, &quot;identify-indicators&quot;]\" />\n      <cacao:property name=\"playbook_processing_summary\" value=\"{&quot;data_markings&quot;: true}\" />\n      <cacao:property name=\"workflow_start\" value=\"start--07bea005-4a36-4a77-bd1f-79a6e4682a13\" />\n      <cacao:property name=\"created\" value=\"2023-02-19T08:00:24.918Z\" />\n      <cacao:property name=\"modified\" value=\"2023-02-19T08:00:24.918Z\" />\n      <cacao:property name=\"created_by\" value=\"identity--5abe695c-7bd5-4c31-8824-2528696cdbf1\" />\n      <cacao:property name=\"valid_from\" value=\"2023-02-19T08:00:24.918Z\" />\n      <cacao:property name=\"valid_until\" value=\"2023-12-31T23:59:59.999Z\" />\n      <cacao:property name=\"derived_from\" value=\"[&quot;playbook--00ee41a2-c2ca-41da-8ea9-681344eb3926&quot;]\" />\n      <cacao:property name=\"labels\" value=\"[&quot;malware&quot;, &quot;fuzzypanda&quot;, &quot;apt&quot;]\" />\n      <cacao:property name=\"markings\" value=\"[&quot;marking-statement--6424867b-0440-4885-bd0b-604d51786d06&quot;, &quot;marking-tlp--bab4a63c-aed9-4cf5-a766-dfca5abac2bb&quot;]\" />\n      <cacao:property name=\"industry_sectors\" value=\"[&quot;aerospace&quot;, &quot;defense&quot;]\" />\n    </bpmn:extensionElements>\n    <bpmn:startEvent id=\"StartEvent_start_07bea005_4a36_4a77_bd1f_79a6e4682a13\" name=\"Start Playbook Example 1\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"start--07bea005-4a36-4a77-bd1f-79a6e4682a13\" />\n        <cacao:property name=\"cacao_step_type\" value=\"start\" />\n      </bpmn:extensionElements>\n    </bpmn:startEvent>\n    <bpmn:task id=\"Task_action_7f40f9d7_de39_4027_ab97_15035beff2ff\" name=\"IP Lookup\">\n      <bpmn:documentation>Lookup the IP address in the SIEM</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--7f40f9d7-de39-4027-ab97-15035beff2ff\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"group--18d3a2e0-f534-4374-a117-abdddd3e809b\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_6b23c237_ade8_4d00_9aa1_75999738d557\" name=\"End Playbook Example 1\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--6b23c237-ade8-4d00-9aa1-75999738d557\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_89910f9c9e6f46dfaf115cc7bd778327\" sourceRef=\"Task_action_7f40f9d7_de39_4027_ab97_15035beff2ff\" targetRef=\"EndEvent_end_6b23c237_ade8_4d00_9aa1_75999738d557\" />\n    <bpmn:sequenceFlow id=\"Flow_cb7d429075c441fd8a00e28cc18051fc\" sourceRef=\"StartEvent_start_07bea005_4a36_4a77_bd1f_79a6e4682a13\" targetRef=\"Task_action_7f40f9d7_de39_4027_ab97_15035beff2ff\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_75c846ea638d4e1c894125d78d62820f\">\n      <bpmn:text>META: id=playbook--61a6c41e-6efc-4516-a242-dfbc5c89d562; name=Find Malware FuzzyPanda; description=This\n      playbook will look for FuzzyPanda on the network and in a SIEM; spec_version=cacao-2.0;\n      playbook_types=investigation\n      playbook_activities=analyze-collected-data, identify-indicators; processing=data_markings;\ncreated=2023-02-19T08:00:24.918Z; modified=2023-02-19T08:00:24.918Z; valid_from=2023-02-19T08:00:24.918Z\n      valid_until=2023-12-31T23:59:59.999Z; workflow_start=start--07bea005-4a36-4a77-bd1f-79a6e4682a13;\ncreated_by=identity--5abe695c-7bd5-4c31-8824-2528696cdbf1\n      derived_from=playbook--00ee41a2-c2ca-41da-8ea9-681344eb3926; labels=malware, fuzzypanda, apt;\nindustry_sectors=aerospace, defense; variables=__data_exfil_site__ (type=ipv4-addr, value=1.2.3.4)\n      marking_refs=marking-statement--6424867b-0440-4885-bd0b-604d51786d06,\nmarking-tlp--bab4a63c-aed9-4cf5-a766-dfca5abac2bb\n      data_markings=marking-statement--6424867b-0440-4885-bd0b-604d51786d06 [Copyright 2023 ACME Security\nCompany], marking-tlp--bab4a63c-aed9-4cf5-a766-dfca5abac2bb [marking-tlp]; external_references=1</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_2d21745bc26f40d189015af40196728f\" sourceRef=\"StartEvent_start_07bea005_4a36_4a77_bd1f_79a6e4682a13\" targetRef=\"TextAnnotation_75c846ea638d4e1c894125d78d62820f\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_adbd62a965af4cc0bcc5c7567efefba3\">\n      <bpmn:text>DATA: commands=manual:Look up IP __data_exfil_site__:value in SIEM\nROLE: agent=IR team; type=group</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_b820533cf5b74ed88b3d0bdd124a590f\" sourceRef=\"Task_action_7f40f9d7_de39_4027_ab97_15035beff2ff\" targetRef=\"TextAnnotation_adbd62a965af4cc0bcc5c7567efefba3\" />\n  </bpmn:process>\n  <bpmndi:BPMNDiagram id=\"BPMNDiagram_1\">\n    <bpmndi:BPMNPlane id=\"BPMNPlane_1\" bpmnElement=\"Process_playbook_61a6c41e-6efc-4516-a242-dfbc5c89d562\">\n      <bpmndi:BPMNShape id=\"BPMNShape_0\" bpmnElement=\"StartEvent_start_07bea005_4a36_4a77_bd1f_79a6e4682a13\">\n        <dc:Bounds x=\"100\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_1\" bpmnElement=\"Task_action_7f40f9d7_de39_4027_ab97_15035beff2ff\">\n        <dc:Bounds x=\"380\" y=\"120\" width=\"160\" height=\"90\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_2\" bpmnElement=\"EndEvent_end_6b23c237_ade8_4d00_9aa1_75999738d557\">\n        <dc:Bounds x=\"660\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_75c846ea638d4e1c894125d78d62820f\" bpmnElement=\"TextAnnotation_75c846ea638d4e1c894125d78d62820f\">\n        <dc:Bounds x=\"226\" y=\"224\" width=\"760\" height=\"264\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_2d21745bc26f40d189015af40196728f\" bpmnElement=\"Association_2d21745bc26f40d189015af40196728f\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"356\" />\n        <di:waypoint x=\"226\" y=\"356\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_adbd62a965af4cc0bcc5c7567efefba3\" bpmnElement=\"TextAnnotation_adbd62a965af4cc0bcc5c7567efefba3\">\n        <dc:Bounds x=\"780\" y=\"120\" width=\"500\" height=\"76\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_b820533cf5b74ed88b3d0bdd124a590f\" bpmnElement=\"Association_b820533cf5b74ed88b3d0bdd124a590f\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"158\" />\n        <di:waypoint x=\"780\" y=\"158\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_0\" bpmnElement=\"Flow_89910f9c9e6f46dfaf115cc7bd778327\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"138\" />\n        <di:waypoint x=\"660\" y=\"138\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_1\" bpmnElement=\"Flow_cb7d429075c441fd8a00e28cc18051fc\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"165\" />\n        <di:waypoint x=\"380\" y=\"165\" />\n      </bpmndi:BPMNEdge>\n    </bpmndi:BPMNPlane>\n  </bpmndi:BPMNDiagram>\n</bpmn:definitions>";
    const titleText = "spec-3.1-example.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
</body>
</html>
