<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>ssh-playbook.bpmn</title>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/diagram-js.css">

  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; background: #f7f7f8; }
    .toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 12px; background: #ffffff; border-bottom: 1px solid #ddd;
    }
    .toolbar button {
      border: 1px solid #ccc; background: #fff; border-radius: 8px; padding: 7px 10px; cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #f4f6fb; }
    .toolbar .grow { flex: 1; }
    .toolbar .title { font-weight: 600; color: #223; }
    .toolbar .hint { color: #555; font-size: 13px; }
    #canvas { width: 100%; height: 100%; background: #fcfcfd; }
    .error { color: #b00020; font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="title"></div>
    <button id="fitBtn">Fit</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="resetBtn">100%</button>
    <button id="handBtn">Hand tool</button>
    <button id="saveXmlBtn">Download BPMN</button>
    <button id="saveSvgBtn">Download SVG</button>
    <div class="grow"></div>

  <div id="canvas"></div>

  <script src="https://unpkg.com/bpmn-js@18/dist/bpmn-modeler.production.min.js"></script>
  <script>
    const initialXml = "<?xml version='1.0' encoding='utf-8'?>\n<bpmn:definitions xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\" xmlns:cacao=\"https://example.org/cacao-bpmn/extensions\" xmlns:dc=\"http://www.omg.org/spec/DD/20100524/DC\" xmlns:di=\"http://www.omg.org/spec/DD/20100524/DI\" id=\"Definitions_4776364d-5cbe-47f0-999f-07bbfc7cca57\" targetNamespace=\"https://example.org/cacao-bpmn\">\n  <bpmn:process id=\"Process_playbook_300270f9-0e64-42c8-93cc-0927edbe3ae7\" name=\"Example ssh\" isExecutable=\"false\">\n    <bpmn:extensionElements>\n      <cacao:property name=\"playbook_id\" value=\"playbook--300270f9-0e64-42c8-93cc-0927edbe3ae7\" />\n      <cacao:property name=\"spec_version\" value=\"cacao-2.0\" />\n      <cacao:property name=\"playbook_types\" value=\"[&quot;notification&quot;]\" />\n      <cacao:property name=\"workflow_start\" value=\"start--9e7d62b2-88ac-4656-94e1-dbd4413ba008\" />\n      <cacao:property name=\"created\" value=\"2023-11-20T15:56:00.123456Z\" />\n      <cacao:property name=\"modified\" value=\"2023-11-20T15:56:00.123456Z\" />\n      <cacao:property name=\"created_by\" value=\"identity--96abab60-238a-44ff-8962-5806aa60cbce\" />\n      <cacao:property name=\"valid_from\" value=\"2023-11-20T15:56:00.123456Z\" />\n      <cacao:property name=\"valid_until\" value=\"2123-11-20T15:56:00.123456Z\" />\n      <cacao:property name=\"labels\" value=\"[&quot;soarca&quot;, &quot;ssh&quot;, &quot;example&quot;]\" />\n    </bpmn:extensionElements>\n    <bpmn:startEvent id=\"StartEvent_start_9e7d62b2_88ac_4656_94e1_dbd4413ba008\" name=\"Start ssh example\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"start--9e7d62b2-88ac-4656-94e1-dbd4413ba008\" />\n        <cacao:property name=\"cacao_step_type\" value=\"start\" />\n      </bpmn:extensionElements>\n    </bpmn:startEvent>\n    <bpmn:task id=\"Task_action_eb9372d4_d524_49fc_bf24_be26ea0 textAnnotation id=\"TextAnnotation_a046f00647924f0d99e09ea3dc3bcce1\">\n      <bpmn:text>DATA: commands=ssh:touch __path__:value, variables=__path__ (type=string, constant=True,\n      value=/root/file1), authentication=user-auth--b7ddc2ea-9f6a-4e82-8eaa-be202e942090 [user-auth]\n      (username=root)\nROLE: agent=soarca-ssh; type=soarca; targets=system 1; type=ssh; address={\"ipv4\": [\"192.168.0.10\"]}</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_84a782288f5b466fa9cf2c1e8d0cba9c\" sourceRef=\"Task_action_88f4c4df_fa96_44e6_b310_1c06d193ea55\" targetRef=\"TextAnnotation_a046f00647924f0d99e09ea3dc3bcce1\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_268acf9afdaa4ca6bc08271fa8c89ab2\">\n      <bpmn:text>OUTCOME: workflow_exception endpoint</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_595bc784a3d441a79b3e908fcc45c202\" sourceRef=\"EndEvent_end_a6f0b81e_affb_4bca_b4f6_a2d5af908958\" targetRef=\"TextAnnotation_268acf9afdaa4ca6bc08271fa8c89ab2\" />\n  </bpmn:process>\n  <bpmndi:BPMNDiagram id=\"BPMNDiagram_1\">\n    <bpmndi:BPMNPlane id=\"BPMNPlane_1\" bpmnElement=\"Process_playbook_300270f9-0e64-42c8-93cc-0927edbe3ae7\">\n      <bpmndi:BPMNShape id=\"BPMNShape_0\" bpmnElement=\"StartEvent_start_9e7d62b2_88ac_4656_94e1_dbd4413ba008\">\n        <dc:Bounds x=\"100\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_1\" bpmnElement=\"Task_action_eb9372d4_d524_49fc_bf24_be26ea084779\">\n        <dc:Bounds x=\"380\" y=\"120\" width=\"160\" height=\"90\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_2\" bpmnElement=\"Task_action_88f4c4df_fa96_44e6_b310_1c06d193ea55\">\n        <dc:Bounds x=\"660\" y=\"120\" width=\"160\" height=\"90\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_3\" bpmnElement=\"EndEvent_end_a6f0b81e_affb_4bca_b4f6_a2d5af908958\">\n        <dc:Bounds x=\"940\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_7c9afac591434220b9f832c2e2e16cd4\" bpmnElement=\"TextAnnotation_7c9afac591434220b9f832c2e2e16cd4\">\n        <dc:Bounds x=\"226\" y=\"224\" width=\"700\" height=\"174\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_ba11bf90df7d4e748dca33c9d16ea262\" bpmnElement=\"Association_ba11bf90df7d4e748dca33c9d16ea262\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"311\" />\n        <di:waypoint x=\"226\" y=\"311\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_9f321ab2058e43a3b98b1d06a0892ef9\" bpmnElement=\"TextAnnotation_9f321ab2058e43a3b98b1d06a0892ef9\">\n        <dc:Bounds x=\"630\" y=\"422\" width=\"740\" height=\"84\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_d368abf0787142c78b0f4753977d3b83\" bpmnElement=\"Association_d368abf0787142c78b0f4753977d3b83\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"670\" y=\"165\" />\n        <di:waypoint x=\"670\" y=\"464\" />\n        <di:waypoint x=\"630\" y=\"464\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_a046f00647924f0d99e09ea3dc3bcce1\" bpmnElement=\"TextAnnotation_a046f00647924f0d99e09ea3dc3bcce1\">\n        <dc:Bounds x=\"1060\" y=\"120\" width=\"740\" height=\"102\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_84a782288f5b466fa9cf2c1e8d0cba9c\" bpmnElement=\"Association_84a782288f5b466fa9cf2c1e8d0cba9c\">\n        <di:waypoint x=\"820\" y=\"165\" />\n        <di:waypoint x=\"850\" y=\"165\" />\n        <di:waypoint x=\"850\" y=\"171\" />\n        <di:waypoint x=\"1060\" y=\"171\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_268acf9afdaa4ca6bc08271fa8c89ab2\" bpmnElement=\"TextAnnotation_268acf9afdaa4ca6bc08271fa8c89ab2\">\n        <dc:Bounds x=\"1066\" y=\"240\" width=\"400\" height=\"76\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_595bc784a3d441a79b3e908fcc45c202\" bpmnElement=\"Association_595bc784a3d441a79b3e908fcc45c202\">\n        <di:waypoint x=\"976\" y=\"138\" />\n        <di:waypoint x=\"1006\" y=\"138\" />\n        <di:waypoint x=\"1006\" y=\"278\" />\n        <di:waypoint x=\"1066\" y=\"278\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_0\" bpmnElement=\"Flow_be80056b2cfa47c68e84f30e360a4dd3\">\n        <di:waypoint x=\"820\" y=\"165\" />\n        <di:waypoint x=\"844\" y=\"165\" />\n        <di:waypoint x=\"844\" y=\"151\" />\n        <di:waypoint x=\"916\" y=\"151\" />\n        <di:waypoint x=\"916\" y=\"138\" />\n        <di:waypoint x=\"940\" y=\"138\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_1\" bpmnElement=\"Flow_a2ea48a54391487c95d0e5cd53bac8f7\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"660\" y=\"165\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_2\" bpmnElement=\"Flow_8de1e4261bc14d8a9cf6ea5fb3741ccf\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"165\" />\n        <di:waypoint x=\"380\" y=\"165\" />\n      </bpmndi:BPMNEdge>\n    </bpmndi:BPMNPlane>\n  </bpmndi:BPMNDiagram>\n</bpmn:definitions>";
    const titleText = "ssh-playbook.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
</body>
</html>
