<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>basic-example-1.bpmn</title>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/diagram-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-font/css/bpmn-embedded.css">
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; background: #f7f7f8; }
    .toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 12px; background: #ffffff; border-bottom: 1px solid #ddd;
    }
    .toolbar button {
      border: 1px solid #ccc; background: #fff; border-radius: 8px; padding: 7px 10px; cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #f4f6fb; }
    .toolbar .grow { flex: 1; }
    .toolbar .title { font-weight: 600; color: #223; }
    .toolbar .hint { color: #555; font-size: 13px; }
    #canvas { width: 100%; height: 100%; background: #fcfcfd; }
    .error { color: #b00020; font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="title"></div>
    <button id="fitBtn">Fit</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="resetBtn">100%</button>
    <button id="handBtn">Hand tool</button>
    <button id="saveXmlBtn">Download BPMN</button>
    <button id="saveSvgBtn">Download SVG</button>
    <div class="grow"></div>
    <span class="hint">Drag, move and edit elements if needed.</span>
    <span id="error" class="error"></span>
  </div>
  <div id="canvas"></div>

  <script src="https://unpkg.com/bpmn-js@18/dist/bpmn-modeler.production.min.js"></script>
  <script>
    const initialXml = "<?xml version='1.0' encoding='utf-8'?>\n<bpmn:definitions xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\" xmlns:cacao=\"https://example.org/cacao-bpmn/extensions\" xmlns:dc=\"http://www.omg.org/spec/DD/20100524/DC\" xmlns:di=\"http://www.omg.org/spec/DD/20100524/DI\" id=\"Definitions_f5f53ff0-07a8-4a38-9a51-fa66f7331877\" targetNamespace=\"https://example.org/cacao-bpmn\">\n  <bpmn:process id=\"Process_playbook_fe85f68d-1960-4596-96a2-228113e143cf\" name=\"Bad MAC Address\" isExecutable=\"false\">\n    <bpmn:extensionElements>\n      <cacao:property name=\"playbook_id\" value=\"playbook--fe85f68d-1960-4596-96a2-228113e143cf\" />\n      <cacao:property name=\"spec_version\" value=\"cacao-2.0\" />\n      <cacao:property name=\"workflow_start\" value=\"start--fa16a4e9-e6b9-4658-b464-ca1632ff57f4\" />\n      <cacao:property name=\"created\" value=\"2023-02-19T01:09:00.000Z\" />\n      <cacao:property name=\"modified\" value=\"2023-02-19T01:09:00.000Z\" />\n      <cacao:property name=\"created_by\" value=\"identity--351b1469-64b4-4778-8d93-f7949a88990d\" />\n    </bpmn:extensionElements>\n    <bpmn:startEvent id=\"StartEvent_start_fa16a4e9_e6b9_4658_b464_ca1632ff57f4\" name=\"Start\">\n      <bpmn:documentation>Start example playbook.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"start--fa16a4e9-e6b9-4658-b464-ca1632ff57f4\" />\n        <cacao:property name=\"cacao_step_type\" value=\"start\" />\n      </bpmn:extensionElements>\n    </bpmn:startEvent>\n    <bpmn:task id=\"Task_action_6398eb05_3eb8_43f5_87d3_f24e07492a41\" name=\"Block MAC address\">\n      <bpmn:documentation>This command blocks a MAC address on a switch.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--6398eb05-3eb8-43f5-87d3-f24e07492a41\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"individual--75baba7d-a198-4c5c-805c-af616b4f7a31\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--3c1daf98-7e22-4e0c-bb8c-6bd78159ca5d&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_116cdac5_63f1_4d8f_b3a8_e5667936e9b6\" name=\"End\">\n      <bpmn:documentation>End of example playbook.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--116cdac5-63f1-4d8f-b3a8-e5667936e9b6\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_1986756a3e004be88796699124b32595\" sourceRef=\"Task_action_6398eb05_3eb8_43f5_87d3_f24e07492a41\" targetRef=\"EndEvent_end_116cdac5_63f1_4d8f_b3a8_e5667936e9b6\" />\n    <bpmn:sequenceFlow id=\"Flow_c8f5bc64e95447e594bd71fb8921ebdb\" sourceRef=\"StartEvent_start_fa16a4e9_e6b9_4658_b464_ca1632ff57f4\" targetRef=\"Task_action_6398eb05_3eb8_43f5_87d3_f24e07492a41\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_c18d93d7edbc485186ebbe914261f46e\">\n      <bpmn:text>META: id=playbook--fe85f68d-1960-4596-96a2-228113e143cf; name=Bad MAC Address;\n      description=This playbook addresses a malicious MAC address, illustrating\n      an action step, command, and agent/target.; spec_version=cacao-2.0\n      created=2023-02-19T01:09:00.000Z; modified=2023-02-19T01:09:00.000Z;\nworkflow_start=start--fa16a4e9-e6b9-4658-b464-ca1632ff57f4;\ncreated_by=identity--351b1469-64b4-4778-8d93-f7949a88990d</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_9312a438984442b290f14d2d5a8ce810\" sourceRef=\"StartEvent_start_fa16a4e9_e6b9_4658_b464_ca1632ff57f4\" targetRef=\"TextAnnotation_c18d93d7edbc485186ebbe914261f46e\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_f48baa2385d44c12aa3a930dfaf8427a\">\n      <bpmn:text>DATA: commands=ssh:Switch(conf)#mac address-table static 3467.0933...\nROLE: agent=Network Admin; type=individual; targets=Switch;\n      type=security-category; category=switch</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_0a6d900d4216443f90db16d84f048cd0\" sourceRef=\"Task_action_6398eb05_3eb8_43f5_87d3_f24e07492a41\" targetRef=\"TextAnnotation_f48baa2385d44c12aa3a930dfaf8427a\" />\n  </bpmn:process>\n  <bpmndi:BPMNDiagram id=\"BPMNDiagram_1\">\n    <bpmndi:BPMNPlane id=\"BPMNPlane_1\" bpmnElement=\"Process_playbook_fe85f68d-1960-4596-96a2-228113e143cf\">\n      <bpmndi:BPMNShape id=\"BPMNShape_0\" bpmnElement=\"StartEvent_start_fa16a4e9_e6b9_4658_b464_ca1632ff57f4\">\n        <dc:Bounds x=\"100\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_1\" bpmnElement=\"Task_action_6398eb05_3eb8_43f5_87d3_f24e07492a41\">\n        <dc:Bounds x=\"380\" y=\"120\" width=\"160\" height=\"90\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_2\" bpmnElement=\"EndEvent_end_116cdac5_63f1_4d8f_b3a8_e5667936e9b6\">\n        <dc:Bounds x=\"660\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_c18d93d7edbc485186ebbe914261f46e\" bpmnElement=\"TextAnnotation_c18d93d7edbc485186ebbe914261f46e\">\n        <dc:Bounds x=\"226\" y=\"224\" width=\"580\" height=\"138\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_9312a438984442b290f14d2d5a8ce810\" bpmnElement=\"Association_9312a438984442b290f14d2d5a8ce810\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"293\" />\n        <di:waypoint x=\"226\" y=\"293\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_f48baa2385d44c12aa3a930dfaf8427a\" bpmnElement=\"TextAnnotation_f48baa2385d44c12aa3a930dfaf8427a\">\n        <dc:Bounds x=\"780\" y=\"120\" width=\"500\" height=\"84\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_0a6d900d4216443f90db16d84f048cd0\" bpmnElement=\"Association_0a6d900d4216443f90db16d84f048cd0\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"162\" />\n        <di:waypoint x=\"780\" y=\"162\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_0\" bpmnElement=\"Flow_1986756a3e004be88796699124b32595\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"138\" />\n        <di:waypoint x=\"660\" y=\"138\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_1\" bpmnElement=\"Flow_c8f5bc64e95447e594bd71fb8921ebdb\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"165\" />\n        <di:waypoint x=\"380\" y=\"165\" />\n      </bpmndi:BPMNEdge>\n    </bpmndi:BPMNPlane>\n  </bpmndi:BPMNDiagram>\n</bpmn:definitions>";
    const titleText = "basic-example-1.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
</body>
</html>
