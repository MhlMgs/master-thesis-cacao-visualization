<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fin-playbook.bpmn</title>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/diagram-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@18/dist/assets/bpmn-font/css/bpmn-embedded.css">
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; background: #f7f7f8; }
    .toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 12px; background: #ffffff; border-bottom: 1px solid #ddd;
    }
    .toolbar button {
      border: 1px solid #ccc; background: #fff; border-radius: 8px; padding: 7px 10px; cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #f4f6fb; }
    .toolbar .grow { flex: 1; }
    .toolbar .title { font-weight: 600; color: #223; }
    .toolbar .hint { color: #555; font-size: 13px; }
    #canvas { width: 100%; height: 100%; background: #fcfcfd; }
    .error { color: #b00020; font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="title"></div>
    <button id="fitBtn">Fit</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="resetBtn">100%</button>
    <button id="handBtn">Hand tool</button>
    <button id="saveXmlBtn">Download BPMN</button>
    <button id="saveSvgBtn">Download SVG</button>
    <div class="grow"></div>
    <span class="hint">Drag, move and edit elements if needed.</span>
    <span id="error" class="error"></span>
  </div>
  <div id="canvas"></div>

  <script src="https://unpkg.com/bpmn-js@18/dist/bpmn-modeler.production.min.js"></script>

286cf326d\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_156d0625_26cb_458d_997b_c1f8a552cb3c\" name=\"End step\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--156d0625-26cb-458d-997b-c1f8a552cb3c\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_458c114bcc3b4bdeb74e5054e320aa30\" sourceRef=\"Task_action_2fd6bca0_24ed_4d74_8eae_da126a84f7c4\" targetRef=\"EndEvent_end_156d0625_26cb_458d_997b_c1f8a552cb3c\" />\n    <bpmn:sequenceFlow id=\"Flow_98d834dcc4d440abbfed3a50241d307e\" sourceRef=\"StartEvent_start_b6c62023_dbd4_422e_adf9_505277f29a79\" targetRef=\"Task_action_2fd6bca0_24ed_4d74_8eae_da126a84f7c4\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_8a694bacffe54e4cacf1025337a9b2ae\">\n      <bpmn:text>META: id=playbook--3c9885e6-95cc-49cb-9044-0e1d2c22be4a; name=New Playbook1; description=This is a\n      template playbook containing only a start and end node; spec_version=cacao-2.0;\n      created=2025-06-23T09:41:13.868Z\n      modified=2023-11-01T15:33:31.072Z; workflow_start=start--b6c62023-dbd4-422e-adf9-505277f29a79;\ncreated_by=identity--112e9923-5c87-4cf2-9685-eda58a162a7a; revoked=False</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_ff9d70dde1fc44ed91dd4e6ed57c350b\" sourceRef=\"StartEvent_start_b6c62023_dbd4_422e_adf9_505277f29a79\" targetRef=\"TextAnnotation_8a694bacffe54e4cacf1025337a9b2ae\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_11c4b89e49554b9a9c34a97f0cd57ac0\">\n      <bpmn:text>DATA: commands=pong\nROLE: agent=soarca-fin-pong-f896bb3b-bb37-429e-8ece-2d4286cf326d;\n      type=net-address</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_9eac50a7ff6e43388a28504d5fdfe9cd\" sourceRef=\"Task_action_2fd6bca0_24ed_4d74_8eae_da126a84f7c4\" targetRef=\"TextAnnotation_11c4b89e49554b9a9c34a97f0cd57ac0\" />\n  </bpmn:process>\n  <bpmndi:BPMNDiagram id=\"BPMNDiagram_1\">\n    <bpmndi:BPMNPlane id=\"BPMNPlane_1\" bpmnElement=\"Process_playbook_3c9885e6-95cc-49cb-9044-0e1d2c22be4a\">\n      <bpmndi:BPMNShape id=\"BPMNShape_0\" bpmnElement=\"StartEvent_start_b6c62023_dbd4_422e_adf9_505277f29a79\">\n        <dc:Bounds x=\"100\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_1\" bpmnElement=\"Task_action_2fd6bca0_24ed_4d74_8eae_da126a84f7c4\">\n        <dc:Bounds x=\"380\" y=\"120\" width=\"160\" height=\"90\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_2\" bpmnElement=\"EndEvent_end_156d0625_26cb_458d_997b_c1f8a552cb3c\">\n        <dc:Bounds x=\"660\" y=\"120\" width=\"36\" height=\"36\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_8a694bacffe54e4cacf1025337a9b2ae\" bpmnElement=\"TextAnnotation_8a694bacffe54e4cacf1025337a9b2ae\">\n        <dc:Bounds x=\"226\" y=\"224\" width=\"740\" height=\"120\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_ff9d70dde1fc44ed91dd4e6ed57c350b\" bpmnElement=\"Association_ff9d70dde1fc44ed91dd4e6ed57c350b\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"138\" />\n        <di:waypoint x=\"166\" y=\"284\" />\n        <di:waypoint x=\"226\" y=\"284\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNShape id=\"BPMNShape_TextAnnotation_11c4b89e49554b9a9c34a97f0cd57ac0\" bpmnElement=\"TextAnnotation_11c4b89e49554b9a9c34a97f0cd57ac0\">\n        <dc:Bounds x=\"780\" y=\"120\" width=\"460\" height=\"84\" />\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Association_9eac50a7ff6e43388a28504d5fdfe9cd\" bpmnElement=\"Association_9eac50a7ff6e43388a28504d5fdfe9cd\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"165\" />\n        <di:waypoint x=\"570\" y=\"162\" />\n        <di:waypoint x=\"780\" y=\"162\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_0\" bpmnElement=\"Flow_458c114bcc3b4bdeb74e5054e320aa30\">\n        <di:waypoint x=\"540\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"165\" />\n        <di:waypoint x=\"564\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"151\" />\n        <di:waypoint x=\"636\" y=\"138\" />\n        <di:waypoint x=\"660\" y=\"138\" />\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"BPMNEdge_Flow_1\" bpmnElement=\"Flow_98d834dcc4d440abbfed3a50241d307e\">\n        <di:waypoint x=\"136\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"138\" />\n        <di:waypoint x=\"160\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"151\" />\n        <di:waypoint x=\"356\" y=\"165\" />\n        <di:waypoint x=\"380\" y=\"165\" />\n      </bpmndi:BPMNEdge>\n    </bpmndi:BPMNPlane>\n  </bpmndi:BPMNDiagram>\n</bpmn:definitions>";
    const titleText = "fin-playbook.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
</body>
</html>
