  <script>
    const initialXml = "<?xml version='1.0' encoding='utf-8'?>\n<bpmn:definitions xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\" xmlns:cacao=\"https://example.org/cacao-bpmn/extensions\" xmlns:dc=\"http://www.omg.org/spec/DD/20100524/DC\" xmlns:di=\"http://www.omg.org/spec/DD/20100524/DI\" id=\"Definitions_f3b708ce-7c01-44d5-bd77-42f213fba545\" targetNamespace=\"https://example.org/cacao-bpmn\">\n  <bpmn:process id=\"Process_playbook_fefb9f12-d308-461c-8aa7-a5d6279ab468\" name=\"LockyBart ransomware\" isExecutable=\"false\">\n    <bpmn:extensionElements>\n      <cacao:property name=\"playbook_id\" value=\"playbook--fefb9f12-d308-461c-8aa7-a5d6279ab468\" />\n      <cacao:property name=\"spec_version\" value=\"cacao-2.0\" />\n      <cacao:property name=\"playbook_types\" value=\"[&quot;attack&quot;]\" />\n      <cacao:property name=\"playbook_activities\" value=\"[&quot;step-sequence&quot;]\" />\n      <cacao:property name=\"workflow_start\" value=\"start--507aadb2-9f8f-4937-8643-5f50cd358906\" />\n      <cacao:property name=\"created\" value=\"2023-05-01T12:08:00.000Z\" />\n      <cacao:property name=\"modified\" value=\"2023-05-01T12:08:00.000Z\" />\n      <cacao:property name=\"created_by\" value=\"identity--c59f3ff7-2f24-5bd4-a0ed-2fd36ec04b06\" />\n      <cacao:property name=\"labels\" value=\"[&quot;ransonware&quot;, &quot;LockyBart&quot;]\" />\n    </bpmn:extensionElements>\n    <bpmn:startEvent id=\"StartEvent_start_507aadb2_9f8f_4937_8643_5f50cd358906\" name=\"Start LockyBart ransomware attack\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"start--507aadb2-9f8f-4937-8643-5f50cd358906\" />\n        <cacao:property name=\"cacao_step_type\" value=\"start\" />\n      </bpmn:extensionElements>\n    </bpmn:startEvent>\n    <bpmn:task id=\"Task_action_cdc2f237_8823_413b_8beb_84a612be0ae8\" name=\"Use a software protection technique\">\n      <bpmn:documentation>Code virtualization is added to the Locky Bart binary using WPProtect.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--cdc2f237-8823-413b-8beb-84a612be0ae8\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"group--a757ce82-b838-4c68-9e41-74b0e94211a5\" />\n        <cacao:property name=\"targets\" value=\"[&quot;software--5e1cadae-7532-45d8-89f8-fe051a1e7df8&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_3fdb51db_2548_4beb_ab7d_f52b3ab1e5ed\" name=\" Install LockyBart on victim's endpoint\">\n      <bpmn:documentation>ftp LockyBart to victim</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--3fdb51db-2548-4beb-ab7d-f52b3ab1e5ed\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"group--a757ce82-b838-4c68-9e41-74b0e94211a5\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--324ccb41-3306-4876-b017-1e07a81e16de&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_7953f6e2_5f09_4fe3_8ffd_476ec5dabe3c\" name=\"Wipe System Restore Points with VSSadmin\">\n      <bpmn:documentation>The ransomware deletes any backed-up files</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--7953f6e2-5f09-4fe3-8ffd-476ec5dabe3c\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"software--5e1cadae-7532-45d8-89f8-fe051a1e7df8\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_d31e28d1_3584_4f59_a139_6764c6509c6e\" name=\"Generate a seed to create a key to encrypt user\u2019s files.\">\n      <bpmn:documentation>Execute the function used to generate a seed, which is used to create a key to encrypt the files with. It uses variables like system time, process ID, thread ID, Process Alive Time, and CPU ticks to generate a random number</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--d31e28d1-3584-4f59-a139-6764c6509c6e\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"software--5e1cadae-7532-45d8-89f8-fe051a1e7df8\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_191bce6e_2fea_4a7e_b4a5_c0d96f129a8d\" name=\"Enumerate the files it wants to encrypt, skipping certain folders to speed it up\">\n      <bpmn:documentation>Scan filesystem for user files</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--191bce6e-2fea-4a7e-b4a5-c0d96f129a8d\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"software--5e1cadae-7532-45d8-89f8-fe051a1e7df8\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--acc1cff5-af87-4caa-8529-84b08c187653&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_edd41723_869d_5a07_9971_55876c706533\" name=\"Generate Key using data on victim's endpoint\">\n      <bpmn:documentation>Locky Bart gathers information on the victim\u2019s machine to create an encryption key.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--edd41723-869d-5a07-9971-55876c706533\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"software--5e1cadae-7532-45d8-89f8-fe051a1e7df8\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--324ccb41-3306-4876-b017-1e07a81e16de&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_3f0dc5a7_ffd8_57e1_8b0b_2181638f5c95\" name=\"Encrypt Files\">\n      <bpmn:documentation>Encrypt files gathered during a previous step with the key generated in the previous step</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--3f0dc5a7-ffd8-57e1-8b0b-2181638f5c95\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"software--5e1cadae-7532-45d8-89f8-fe051a1e7df8\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--191bce6e-2fea-4a7e-b4a5-c0d96f129a8d&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_a7fca25a_2ee2_59c0_8df6_9f6ade83e286\" name=\"Encrypt key\">\n      <bpmn:documentation>Encrypt the key used to encrypt the files with a master key, which now becomes the victim\u2019s UID used to identify them</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--a7fca25a-2ee2-59c0-8df6-9f6ade83e286\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"software--5e1cadae-7532-45d8-89f8-fe051a1e7df8\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_e742fc09_743d_4174_9edb_1b4bcccd03bb\" name=\"Create and display ransom note\">\n      <bpmn:documentation>Locky Bart then generates a URL on the victim\u2019s machine. It contains the link to a TOR cloaked .onion address where the malicious backend website is hosted. This URL has a user ID within it. This UID is the original decryption key, in encrypted form. Display the ransom note on the desktop with the URL to a payment page.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--e742fc09-743d-4174-9edb-1b4bcccd03bb\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"software--5e1cadae-7532-45d8-89f8-fe051a1e7df8\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_0176c66e_9dad_4008_8b4c_bc2d52264557\" name=\"Ransomware attack initiated\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--0176c66e-9dad-4008-8b4c-bc2d52264557\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_b3e1084d38df4fd0b7341be088f138fe\" sourceRef=\"Task_action_e742fc09_743d_4174_9edb_1b4bcccd03bb\" targetRef=\"EndEvent_end_0176c66e_9dad_4008_8b4c_bc2d52264557\" />\n    <bpmn:sequenceFlow id=\"Flow_e5965d0370b44c3f9a359ee176b39f91\" sourceRef=\"Task_action_a7fca25a_2ee2_59c0_8df6_9f6ade83e286\" targetRef=\"Task_action_e742fc09_743d_4174_9edb_1b4bcccd03bb\" />\n    <bpmn:sequenceFlow id=\"Flow_1a9e09ff9dca417b8df61f1085ab2bc3\" sourceRef=\"Task_action_3f0dc5a7_ffd8_57e1_8b0b_2181638f5c95\" targetRef=\"Task_action_a7fca25a_2ee2_59c0_8df6_9f6ade83e286\" />\n    <bpmn:sequenceFlow id=\"Flow_4c6e413fbd99445cb01e8d0075ffba3e\" sourceRef=\"Task_action_edd41723_869d_5a07_9971_55876c706533\" targetRef=\"Task_action_3f0dc5a7_ffd8_57e1_8b0b_2181638f5c95\" />\n    <bpmn:sequenceFlow id=\"Flow_2a108c2eac9b4e6d807fd615c8f3530d\" sourceRef=\"Task_action_191bce6e_2fea_4a7e_b4a5_c0d96f129a8d\" targetRef=\"Task_action_edd41723_869d_5a07_9971_55876c706533\" />\n    <bpmn:sequenceFlow id=\"Flow_f28382516c5846169be179e7653fef05\" sourceRef=\"Task_action_d31e28d1_3584_4f59_a139_6764c6509c6e\" targetRef=\"Task_action_191bce6e_2fea_4a7e_b4a5_c0d96f129a8d\" />\n    <bpmn:sequenceFlow id=\"Flow_1b89a36190784b549f5645a19c8eaa66\" sourceRef=\"Task_action_7953f6e2_5f09_4fe3_8ffd_476ec5dabe3c\" targetRef=\"Task_action_d31e28d1_3584_4f59_a139_6764c6509c6e\" />\n    <bpmn:sequenceFlow id=\"Flow_52c334396e8541688c57ac9b177c5ac8\" sourceRef=\"Task_action_3fdb51db_2548_4beb_ab7d_f52b3ab1e5ed\" targetRef=\"Task_action_7953f6e2_5f09_4fe3_8ffd_476ec5dabe3c\" />\n    <bpmn:sequenceFlow id=\"Flow_f88c978423b44ca09df89099e27603ec\" sourceRef=\"Task_action_cdc2f237_8823_413b_8beb_84a612be0ae8\" targetRef=\"Task_action_3fdb51db_2548_4beb_ab7d_f52b3ab1e5ed\" />\n    <bpmn:sequenceFlow id=\"Flow_5a86b764f0a04d4d86e3b18ef8f30ac2\" sourceRef=\"StartEvent_start_507aadb2_9f8f_4937_8643_5f50cd358906\" targetRef=\"Task_action_cdc2f237_8823_413b_8beb_84a612be0ae8\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_e4bf27de0aba466a955ffc69ba380e4d\">\n      <bpmn:text>META: id=playbook--fefb9f12-d308-461c-8aa7-a5d6279ab468; name=LockyBart ransomware;\n      description=This playbook captures the sequence of steps of how encrypts files to\n      obtain a ransom using the LockyBart ransomware.\n      spec_version=cacao-2.0; playbook_types=attack; playbook_activities=step-sequence;\ncreated=2023-05-01T12:08:00.000Z; modified=2023-05-01T12:08:00.000Z;\nworkflow_start=start--507aadb2-9f8f-4937-8643-5f50cd358906\n      created_by=identity--c59f3ff7-2f24-5bd4-a0ed-2fd36ec04b06; labels=ransonware,\nLockyBart; external_references=1</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_09ae0cb136c14a3688b6c11b3302e2a4\" sourceRef=\"StartEvent_start_507aadb2_9f8f_4937_8643_5f50cd358906\" targetRef=\"TextAnnotation_e4bf27de0aba466a955ffc69ba380e4d\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_04913682fa984645b80af576a8fb5680\">\n      <bpmn:text>DATA: commands=bash:WPProtect\nROLE: agent=Adversary Group; type=group; targets=LockyBart; type=software</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_1d06ea36983040f4998bab6d57129330\" sourceRef=\"Task_action_cdc2f237_8823_413b_8beb_84a612be0ae8\" targetRef=\"TextAnnotation_04913682fa984645b80af576a8fb5680\" />\n    <bpmn:textAnnotati     const titleText = "locky-bart-mbc-examples.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
