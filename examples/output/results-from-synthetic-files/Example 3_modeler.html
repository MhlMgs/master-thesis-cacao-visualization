  <script src="https://unpkg.com/bpmn-js@18/dist/bpmn-modeler.production.min.js"></script>
  <script>
    const initialXml = "<?xml version='1.0' encoding='utf-8'?>\n<bpmn:definitions xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\" xmlns:cacao=\"https://example.org/cacao-bpmn/extensions\" xmlns:dc=\"http://www.omg.org/spec/DD/20100524/DC\" xmlns:di=\"http://www.omg.org/spec/DD/20100524/DI\" id=\"Definitions_463d8cd3-9b66-4eb0-8904-02171a26041a\" targetNamespace=\"https://example.org/cacao-bpmn\">\n  <bpmn:process id=\"Process_playbook_3c4d5e6f-1111-4222-8333-1234567890ab\" name=\"Phishing Investigation and Remediation Demonstration\" isExecutable=\"false\">\n    <bpmn:extensionElements>\n      <cacao:property name=\"playbook_id\" value=\"playbook--3c4d5e6f-1111-4222-8333-1234567890ab\" />\n      <cacao:property name=\"spec_version\" value=\"2.0\" />\n      <cacao:property name=\"playbook_types\" value=\"[&quot;investigation&quot;, &quot;remediation&quot;, &quot;notification&quot;]\" />\n      <cacao:property name=\"playbook_activities\" value=\"[&quot;analyze-collected-data&quot;, &quot;restrict-access&quot;, &quot;notify&quot;]\" />\n      <cacao:property name=\"playbook_processing_summary\" value=\"Combines analyst review, automated account restriction and stakeholder notification.\" />\n      <cacao:property name=\"workflow_start\" value=\"start--phishing\" />\n      <cacao:property name=\"created\" value=\"2025-04-24T09:00:00Z\" />\n      <cacao:property name=\"modified\" value=\"2025-04-24T09:00:00Z\" />\n      <cacao:property name=\"created_by\" value=\"identity--9b8f4e12-aaaa-4b56-9c12-abcdefabcdef\" />\n      <cacao:property name=\"valid_from\" value=\"2025-04-24T09:00:00Z\" />\n      <cacao:property name=\"valid_until\" value=\"2026-04-24T09:00:00Z\" />\n      <cacao:property name=\"revoked\" value=\"false\" />\n      <cacao:property name=\"derived_from\" value=\"[&quot;playbook--legacy-phishing-investigation-demo&quot;]\" />\n      <cacao:property name=\"labels\" value=\"[&quot;synthetic&quot;, &quot;phishing&quot;, &quot;validation-demo&quot;]\" />\n      <cacao:property name=\"markings\" value=\"[&quot;marking-definition--tlp-green-demo&quot;]\" />\n      <cacao:property name=\"industry_sectors\" value=\"[&quot;finance&quot;, &quot;government&quot;]\" />\n    </bpmn:extensionElements>\n    <bpmn:startEvent id=\"StartEvent_start_phishing\" name=\"Start Investigation\">\n      <bpmn:documentation>Begin handling of a reported phishing email.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"start--phishing\" />\n        <cacao:property name=\"cacao_step_type\" value=\"start\" />\n      </bpmn:extensionElements>\n    </bpmn:startEvent>\n    <bpmn:task id=\"Task_action_review_alert\" name=\"Review Reported Alert\">\n      <bpmn:documentation>Analyst reviews the reported message and initial enrichment context.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--review-alert\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"delay\" value=\"PT5M\" />\n        <cacao:property name=\"timeout\" value=\"PT20M\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;reported_message_id&quot;, &quot;reporting_user&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;message_headers&quot;, &quot;mailbox_user&quot;, &quot;phishing_score&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;triage_status&quot;]\" />\n        <cacao:property name=\"markings\" value=\"[&quot;marking-definition--tlp-green-demo&quot;]\" />\n        <cacao:property name=\"agent\" value=\"group--soc-tier2\" />\n        <cacao:property name=\"targets\" value=\"[&quot;http-api--email-archive&quot;, &quot;linux--mail-analysis-host&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:exclusiveGateway id=\"Gateway_if_credible\" name=\"Phishing Credible?\">\n      <bpmn:documentation>Determine whether the reported email should be treated as a phishing incident.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"if--credible\" />\n        <cacao:property name=\"cacao_step_type\" value=\"if-condition\" />\n      </bpmn:extensionElements>\n    </bpmn:exclusiveGateway>\n    <bpmn:parallelGateway id=\"Gateway_parallel_response\" name=\"Immediate Response Activities\">\n      <bpmn:documentation>Perform automated restriction and evidence collection in parallel.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"parallel--response\" />\n        <cacao:property name=\"cacao_step_type\" value=\"parallel\" />\n      </bpmn:extensionElements>\n    </bpmn:parallelGateway>\n    <bpmn:task id=\"Task_action_disable_account\" name=\"Disable Account via OpenC2\">\n      <bpmn:documentation>Use the SOAR platform to suspend the impacted mailbox account.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--disable-account\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;mailbox_user&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;account_status=disabled&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;notification_required&quot;]\" />\n        <cacao:property name=\"agent\" value=\"http-api--soar\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--credential-theft&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_document_response\" name=\"Document Immediate Response\">\n      <bpmn:documentation>Record the first response actions in the case system.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--document-response\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;case_status=contained&quot;]\" />\n        <cacao:property name=\"agent\" value=\"organization--security-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--phishing&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:exclusiveGateway id=\"Gateway_switch_escalation\" name=\"Select Additional Escalation Path\">\n      <bpmn:documentation>Choose the next path based on confidence and communication needs.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"switch--escalation\" />\n        <cacao:property name=\"cacao_step_type\" value=\"switch-condition\" />\n      </bpmn:extensionElements>\n    </bpmn:exclusiveGateway>\n    <bpmn:task id=\"Task_playbook_action_notify_stakeholders\" name=\"Call Stakeholder Notification Playbook\">\n      <bpmn:documentation>Invoke a separate notification playbook for business stakeholders.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"playbook-action--notify-stakeholders\" />\n        <cacao:property name=\"cacao_step_type\" value=\"playbook-action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;mailbox_user&quot;, &quot;artifact_bundle&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;notification_status=sent&quot;]\" />\n        <cacao:property name=\"agent\" value=\"organization--security-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;organization--hr&quot;]\" />\n        <cacao:property name=\"playbook_id\" value=\"playbook--stakeholder-notification-demo\" />\n        <cacao:property name=\"playbook_version\" value=\"1.0\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_close_contained\" name=\"Close Contained Case\">\n      <bpmn:documentation>Finalize the phishing case after remediation and communication steps.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--close-contained\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;case_status=closed_contained&quot;]\" />\n        <cacao:property name=\"agent\" value=\"organization--security-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--phishing&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_closed\" name=\"Case Closed\">\n      <bpmn:documentation>The phishing case has been finalized.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--closed\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_f5633e5165c046a8ab7a6771ffaab108\" sourceRef=\"Task_action_close_contained\" targetRef=\"EndEvent_end_closed\" />\n    <bpmn:sequenceFlow id=\"Flow_106a30228131418ba7d5ef8434c65167\" sourceRef=\"Task_playbook_action_notify_stakeholders\" targetRef=\"Task_action_close_contained\" />\n    <bpmn:sequenceFlow id=\"Flow_176753e6d73747f482eb21aa385a3a01\" sourceRef=\"Gateway_switch_escalation\" targetRef=\"Task_playbook_action_notify_stakeholders\" name=\"high-confidence\" />\n    <bpmn:task id=\"Task_action_manual_review\" name=\"Escalate to Manual Review\">\n      <bpmn:documentation>Escalate the case to deeper analyst review and scope assessment.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--manual-review\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"timeout\" value=\"PT45M\" />\n        <cacao:property name=\"agent\" value=\"group--soc-tier2\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--credential-theft&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_929614e0e59546d994bea1a049388ee0\" sourceRef=\"Task_action_manual_review\" targetRef=\"Task_action_close_contained\" />\n    <bpmn:sequenceFlow id=\"Flow_9bb20adb31b04a20bb1d075e14ddde82\" sourceRef=\"Gateway_switch_escalation\" targetRef=\"Task_action_manual_review\" name=\"requires-hunting\" />\n    <bpmn:sequenceFlow id=\"Flow_243461809e054b76931d0c49dec195b1\" sourceRef=\"Gateway_switch_escalation\" targetRef=\"Task_action_close_contained\" name=\"Default\" />\n    <bpmn:sequenceFlow id=\"Flow_6fbba45af7a549d48243cba511d7b22b\" sourceRef=\"Task_action_document_response\" targetRef=\"Gateway_switch_escalation\" />\n    <bpmn:endEvent id=\"EndEvent_end_exception\" name=\"Workflow Exception End\">\n      <bpmn:documentation>Used when automated restriction or enrichment cannot be completed.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--exception\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_9c539366f5094f0d97a73c6ba2c830ed\" sourceRef=\"Task_action_disable_account\" targetRef=\"EndEvent_end_exception\" name=\"Failure\" />\n    <bpmn:sequenceFlow id=\"Flow_739b301349514fd0a01c215fc9569462\" sourceRef=\"Gateway_parallel_response\" targetRef=\"Task_action_disable_account\" />\n    <bpmn:task id=\"Task_action_collect_artifacts\" name=\"Collect Mailbox Artifacts\">\n      <bpmn:documentation>Collect headers, attachments and URLs for later review.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--collect-artifacts\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;reported_message_id&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;artifact_bundle&quot;, &quot;contains_malicious_link&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;artifact_status&quot;]\" />\n        <cacao:property name=\"agent\" value=\"software--mail-gateway\" />\n        <cacao:property name=\"targets\" value=\"[&quot;linux--mail-analysis-host&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_be26f1a569cb4a4c9698e492fa3eb25a\" sourceRef=\"Gateway_parallel_response\" targetRef=\"Task_action_collect_artifacts\" />\n    <bpmn:sequenceFlow id=\"Flow_42dabdffed914e1792926501acb851c7\" sourceRef=\"Gateway_if_credible\" targetRef=\"Gateway_parallel_response\" name=\"True\" />\n    <bpmn:task id=\"Task_action_record_benign\" name=\"Record Benign Outcome\">\n      <bpmn:documentation>Document the alert as benign and retain the enrichment result.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--record-benign\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;case_status=benign_closed&quot;]\" />\n        <cacao:property name=\"agent\" value=\"organization--security-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;security-category--credential-theft&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_7071432c36864722b0d869669701fc2a\" sourceRef=\"Task_action_record_benign\" targetRef=\"EndEvent_end_closed\" />\n    <bpmn:sequenceFlow id=\"Flow_fe24b5606cf547b096740cc9ead3b81b\" sourceRef=\"Gateway_if_credible\" targetRef=\"Task_action_record_benign\" name=\"False\" />\n    <bpmn:sequenceFlow id=\"Flow_fc4e2ff6f26246678f2b585bfc689955\" sourceRef=\"Task_action_review_alert\" targetRef=\"Gateway_if_credible\" />\n    <bpmn:sequenceFlow id=\"Flow_19442b5ecf6a4d4e9aff8cf20e160a83\" sourceRef=\"StartEvent_start_phishing\" targetRef=\"Task_action_review_alert\" />\n    <bpmn:parallelGateway id=\"GatewayJoin_parallel_response\">\n      <bpmn:documentation>Synthetic join gateway for parallel step Immediate Response Activities. Perform automated restriction and evidence collection in parallel.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"synthetic_for_step\" value=\"parallel--response\" />\n        <cacao:property name=\"synthetic_for_type\" value=\"parallel\" />\n        <cacao:property name=\"synthetic_kind\" value=\"parallel_join\" />\n      </bpmn:extensionElements>\n    </bpmn:parallelGateway>\n    <bpmn:sequenceFlow id=\"Flow_5441e0788bcf4beab9d3a21463fd1d9a\" sourceRef=\"Task_action_collect_artifacts\" targetRef=\"GatewayJoin_parallel_response\" />\n    <bpmn:sequenceFlow id=\"Flow_483ef949ed6245849cb9adb77f71e1df\" sourceRef=\"Task_action_disable_account\" targetRef=\"GatewayJoin_parallel_response\" />\n    <bpmn:sequenceFlow id=\"Flow_b9c9777560bb4b6cb4b8e4034b3c20bf\" sourceRef=\"GatewayJoin_parallel_response\" targetRef=\"Task_action_document_response\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_2182374377294423ae6af08bd5036b38\">\n      <bpmn:text>META: id=playbook--3c4d5e6f-1111-4222-8333-1234567890ab; name=Phishing Investigation and Remediation\n      Demonstration\n      description=Synthetic playbook used to demonstrate a combined semi-automated phishing investigation\nand remediation workflow.; spec_version=2.0; playbook_types=investigation, remediation, notification\n      playbook_activities=analyze-collected-data, restrict-access, notify; processing=C, o, m, b, i, n, ...\n(+78 more); created=2025-04-24T09:00:00Z; modified=2025-04-24T09:00:00Z; valid_from=2025-04-24T09:00:00Z\n      valid_until=2026-04-24T09:00:00Z; workflow_start=start--phishing;\ncreated_by=identity--9b8f4e12-aaaa-4b56-9c12-abcdefabcdef; revoked=False;     const titleText = "Example 3.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
