  <script src="https://unpkg.com/bpmn-js@18/dist/bpmn-modeler.production.min.js"></script>
  <script>
    const initialXml = "<?xml version='1.0' encoding='utf-8'?>\n<bpmn:definitions xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\" xmlns:cacao=\"https://example.org/cacao-bpmn/extensions\" xmlns:dc=\"http://www.omg.org/spec/DD/20100524/DC\" xmlns:di=\"http://www.omg.org/spec/DD/20100524/DI\" id=\"Definitions_6417c749-2f0e-4b5e-873e-3a09485a9576\" targetNamespace=\"https://example.org/cacao-bpmn\">\n  <bpmn:process id=\"Process_playbook_11111111-2222-4333-8444-555555555555\" name=\"Extended Incident Response Demonstration\" isExecutable=\"false\">\n    <bpmn:extensionElements>\n      <cacao:property name=\"playbook_id\" value=\"playbook--11111111-2222-4333-8444-555555555555\" />\n      <cacao:property name=\"spec_version\" value=\"cacao-2.0\" />\n      <cacao:property name=\"playbook_types\" value=\"[&quot;investigation&quot;, &quot;mitigation&quot;, &quot;notification&quot;]\" />\n      <cacao:property name=\"playbook_activities\" value=\"[&quot;identify&quot;, &quot;analyze&quot;, &quot;contain&quot;, &quot;notify&quot;]\" />\n      <cacao:property name=\"playbook_processing_summary\" value=\"[&quot;Investigate suspicious host activity&quot;, &quot;Contain compromised assets&quot;, &quot;Notify stakeholders and preserve evidence&quot;]\" />\n      <cacao:property name=\"workflow_start\" value=\"start--01\" />\n      <cacao:property name=\"created\" value=\"2026-04-20T09:00:00Z\" />\n      <cacao:property name=\"modified\" value=\"2026-04-20T09:30:00Z\" />\n      <cacao:property name=\"created_by\" value=\"identity--aaaaaaaa-bbbb-4ccc-8ddd-eeeeeeeeeeee\" />\n      <cacao:property name=\"valid_from\" value=\"2026-04-20T00:00:00Z\" />\n      <cacao:property name=\"valid_until\" value=\"2027-04-20T00:00:00Z\" />\n      <cacao:property name=\"revoked\" value=\"false\" />\n      <cacao:property name=\"derived_from\" value=\"[&quot;playbook--00000000-1111-4222-8333-444444444444&quot;]\" />\n      <cacao:property name=\"labels\" value=\"[&quot;synthetic&quot;, &quot;incident-response&quot;, &quot;demo&quot;]\" />\n      <cacao:property name=\"markings\" value=\"[&quot;marking-definition--tlp-amber&quot;]\" />\n      <cacao:property name=\"industry_sectors\" value=\"[&quot;information-technology&quot;, &quot;public-sector&quot;]\" />\n    </bpmn:extensionElements>\n    <bpmn:startEvent id=\"StartEvent_start_01\" name=\"Suspicious Alert Received\">\n      <bpmn:documentation>Start the incident handling workflow.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"start--01\" />\n        <cacao:property name=\"cacao_step_type\" value=\"start\" />\n      </bpmn:extensionElements>\n    </bpmn:startEvent>\n    <bpmn:task id=\"Task_action_triage\" name=\"Initial Triage\">\n      <bpmn:documentation>Validate the alert and enrich context.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--triage\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"delay\" value=\"PT5M\" />\n        <cacao:property name=\"timeout\" value=\"PT30M\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;alert_id&quot;, &quot;host_identifier&quot;, &quot;severity&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;triage_status&quot;, &quot;evidence_bundle&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;triage_status&quot;, &quot;evidence_collected&quot;]\" />\n        <cacao:property name=\"markings\" value=\"[&quot;marking-definition--tlp-amber&quot;]\" />\n        <cacao:property name=\"step_extensions\" value=\"[&quot;host-risk-score&quot;]\" />\n        <cacao:property name=\"agent\" value=\"group--soc-team\" />\n        <cacao:property name=\"targets\" value=\"[&quot;linux--app-server-01&quot;, &quot;security-category--endpoint&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:exclusiveGateway id=\"Gateway_if_condition_escalate\" name=\"Escalate Incident?\">\n      <bpmn:documentation>Check whether the incident requires coordinated response.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"if-condition--escalate\" />\n        <cacao:property name=\"cacao_step_type\" value=\"if-condition\" />\n      </bpmn:extensionElements>\n    </bpmn:exclusiveGateway>\n    <bpmn:exclusiveGateway id=\"Gateway_switch_condition_response_mode\" name=\"Select Response Mode\">\n      <bpmn:documentation>Choose the containment strategy.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"switch-condition--response-mode\" />\n        <cacao:property name=\"cacao_step_type\" value=\"switch-condition\" />\n      </bpmn:extensionElements>\n    </bpmn:exclusiveGateway>\n    <bpmn:task id=\"Task_action_collect_evidence\" name=\"Collect Evidence\">\n      <bpmn:documentation>Acquire forensic data before containment.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--collect-evidence\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"group--soc-team\" />\n        <cacao:property name=\"targets\" value=\"[&quot;linux--app-server-01&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:exclusiveGateway id=\"Gateway_while_condition_containment_loop\" name=\"Containment Needed?\">\n      <bpmn:documentation>Loop until containment is confirmed.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"while-condition--containment-loop\" />\n        <cacao:property name=\"cacao_step_type\" value=\"while-condition\" />\n      </bpmn:extensionElements>\n    </bpmn:exclusiveGateway>\n    <bpmn:task id=\"Task_action_contain_host\" name=\"Contain Host via OpenC2\">\n      <bpmn:documentation>Issue a containment command to the endpoint control platform.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--contain-host\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;host_identifier&quot;, &quot;containment_scope&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;containment_result&quot;]\" />\n        <cacao:property name=\"agent\" value=\"security-category--containment\" />\n        <cacao:property name=\"targets\" value=\"[&quot;http-api--containment&quot;, &quot;linux--app-server-01&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_9dc662d14d814ac7b954865db578696a\" sourceRef=\"Task_action_contain_host\" targetRef=\"Gateway_while_condition_containment_loop\" name=\"Success\" />\n    <bpmn:endEvent id=\"EndEvent_end_workflow_exception\" name=\"Workflow Exception\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--workflow-exception\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_a49b4b8b22e049a5be38f28996d3f733\" sourceRef=\"Task_action_contain_host\" targetRef=\"EndEvent_end_workflow_exception\" name=\"Failure\" />\n    <bpmn:sequenceFlow id=\"Flow_8f94b4af568244caa50708dd3d13e2c4\" sourceRef=\"Gateway_while_condition_containment_loop\" targetRef=\"Task_action_contain_host\" name=\"True\" />\n    <bpmn:parallelGateway id=\"Gateway_parallel_post_containment\" name=\"Post-Containment Activities\">\n      <bpmn:documentation>Run technical and communication activities in parallel.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"parallel--post-containment\" />\n        <cacao:property name=\"cacao_step_type\" value=\"parallel\" />\n      </bpmn:extensionElements>\n    </bpmn:parallelGateway>\n    <bpmn:task id=\"Task_action_update_record\" name=\"Update Incident Record\">\n      <bpmn:documentation>Update the case record after containment has been completed.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--update-record\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"organization--it-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;sector--public&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_final_review\" name=\"Final Review\">\n      <bpmn:documentation>Confirm closure conditions and summarize the response.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--final-review\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"group--soc-team\" />\n        <cacao:property name=\"targets\" value=\"[&quot;linux--app-server-01&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_close_case\" name=\"Close Case\">\n      <bpmn:documentation>Close the playbook run and archive relevant data.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--close-case\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"group--soc-team\" />\n        <cacao:property name=\"targets\" value=\"[&quot;linux--app-server-01&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_complete\" name=\"Incident Closed\">\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--complete\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_86ec059b35f1493a81e6e5d7b1c2c162\" sourceRef=\"Task_action_close_case\" targetRef=\"EndEvent_end_complete\" />\n    <bpmn:sequenceFlow id=\"Flow_79679972418c45fabbbe2a09196032f3\" sourceRef=\"Task_action_final_review\" targetRef=\"Task_action_close_case\" />\n    <bpmn:sequenceFlow id=\"Flow_d460dcfb69184e269ff76b805dd499a1\" sourceRef=\"Gateway_parallel_post_containment\" targetRef=\"Task_action_update_record\" />\n    <bpmn:task id=\"Task_playbook_action_stakeholder_notification\" name=\"Call Stakeholder Notification Playbook\">\n      <bpmn:documentation>Invoke a follow-up notification playbook after containment.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"playbook-action--stakeholder-notification\" />\n        <cacao:property name=\"cacao_step_type\" value=\"playbook-action\" />\n        <cacao:property name=\"agent\" value=\"organization--it-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;sector--public&quot;]\" />\n        <cacao:property name=\"playbook_id\" value=\"playbook--11111111-2222-4333-8444-555555555555\" />\n        <cacao:property name=\"playbook_version\" value=\"2.0\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_70a8975f12434d8ab3e5b599db07e01b\" sourceRef=\"Gateway_parallel_post_containment\" targetRef=\"Task_playbook_action_stakeholder_notification\" />\n    <bpmn:sequenceFlow id=\"Flow_500af3134b524e0e8b99a2161303ff7e\" sourceRef=\"Gateway_while_condition_containment_loop\" targetRef=\"Gateway_parallel_post_containment\" name=\"False\" />\n    <bpmn:sequenceFlow id=\"Flow_837c54510221475999400abc57a0e98d\" sourceRef=\"Task_action_collect_evidence\" targetRef=\"Gateway_while_condition_containment_loop\" />\n    <bpmn:sequenceFlow id=\"Flow_6b30af46e29b47e18ecde01b5f9b9504\" sourceRef=\"Gateway_switch_condition_response_mode\" targetRef=\"Task_action_collect_evidence\" name=\"host-isolated\" />\n    <bpmn:task id=\"Task_action_ticket_only\" name=\"Create Incident Ticket\">\n      <bpmn:documentation>Document the case in the ticketing platform.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--ticket-only\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"agent\" value=\"organization--it-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;sector--public&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_fa0664421fc94b539a7cb2a3492919f3\" sourceRef=\"Task_action_ticket_only\" targetRef=\"Task_action_final_review\" />\n    <bpmn:sequenceFlow id=\"Flow_983cd216f7a34c6796d1c3e1105708bf\" sourceRef=\"Gateway_switch_condition_response_mode\" targetRef=\"Task_action_ticket_only\" name=\"network-contained\" />\n    <bpmn:task id=\"Task_playbook_action_notify\" name=\"Call Notification Playbook\">\n      <bpmn:documentation>Invoke a notification sub-playbook.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"playbook-action--notify\" />\n        <cacao:property name=\"cacao_step_type\" value=\"playbook-action\" />\n        <cacao:property name=\"agent\" value=\"organization--it-ops\" />\n        <cacao:property name=\"targets\" value=\"[&quot;sector--public&quot;]\" />\n        <cacao:property name=\"playbook_id\" value=\"playbook--99999999-8888-4777-8666-555555555555\" />\n        <cacao:property name=\"playbook_version\" value=\"2.0\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_dbad5598980f4e72b9f74d4ae2309cd8\" sourceRef=\"Task_playbook_action_notify\" targetRef=\"Task_action_final_review\" />\n    <bpmn:sequenceFlow id=\"Flow_28b3928a60f742a7bd9dbe1ac675fe16\" sourceRef=\"Gateway_switch_condition_response_mode\" targetRef=\"Task_playbook_action_notify\" name=\"Default\" />\n    <bpmn:sequenceFlow id=\"Flow_7685ffbcf06a4c5fb7e7e0b91ccb8ccc\" sourceRef=\"Gateway_if_condition_escalate\" targetRef=\"Gateway_switch_condition_response_mode\" name=\"True\" />\n    <bpmn:sequenceFlow id=\"Flow_c49f70e563984d50b75d824971e5f2f8\" sourceRef=\"Gateway_if_condition_escalate\" targetRef=\"Task_action_close_case\" name=\"False\" />\n    <bpmn:sequenceFlow id=\"Flow_076059d1c46d48bda6b60efab5583872\" sourceRef=\"Task_action_triage\" targetRef=\"Gateway_if_condition_escalate\" />\n    <bpmn:sequenceFlow id=\"Flow_e4f3b10dd49c49469d4164021a122195\" sourceRef=\"StartEvent_start_01\" targetRef=\"Task_action_triage\" />\n    <bpmn:parallelGateway id=\"GatewayJoin_parallel_post_containment\">\n      <bpmn:documentation>Synthetic join gateway for parallel step Post-Containment Activities. Run technical and communication activities in parallel.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"synthetic_for_step\" value=\"parallel--post-containment\" />\n        <cacao:property name=\"synthetic_for_type\" value=\"parallel\" />\n        <cacao:property name=\"synthetic_kind\" value=\"parallel_join\" />\n      </bpmn:extensionElements>\n    </bpmn:parallelGateway>\n    <bpmn:sequenceFlow id=\"Flow_2e01469d81c948b596a8162b2b59adb2\" sourceRef=\"Task_action_update_record\" targetRef=\"GatewayJoin_parallel_post_containment\" />\n    <bpmn:sequenceFlow id=\"Flow_3a7f4ae346b04e6f888ca1b939734e4d\" sourceRef=\"Task_playbook_action_stakeholder_notification\" targetRef=\"GatewayJoin_parallel_post_containment\" />\n    <bpmn:sequenceFlow id=\"Flow_d76ad336ae2842e4a4cff272ea065c63\" sourceRef=\"GatewayJoin_parallel_post_containment\" targetRef=\"Task_action_final_review\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_a821e7ef08b14bc3860c250e05909550\">\n      <bpmn:text>META: id=playbook--1111     const titleText = "Example 1.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
