  <script>
    const initialXml = "<?xml version='1.0' encoding='utf-8'?>\n<bpmn:definitions xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\" xmlns:cacao=\"https://example.org/cacao-bpmn/extensions\" xmlns:dc=\"http://www.omg.org/spec/DD/20100524/DC\" xmlns:di=\"http://www.omg.org/spec/DD/20100524/DI\" id=\"Definitions_166cb5d9-8f56-40f3-95f5-fe10c0399969\" targetNamespace=\"https://example.org/cacao-bpmn\">\n  <bpmn:process id=\"Process_playbook_22222222-3333-4444-8555-666666666666\" name=\"TI Enrichment and Escalation Demo\" isExecutable=\"false\">\n    <bpmn:extensionElements>\n      <cacao:property name=\"playbook_id\" value=\"playbook--22222222-3333-4444-8555-666666666666\" />\n      <cacao:property name=\"spec_version\" value=\"cacao-2.0\" />\n      <cacao:property name=\"playbook_types\" value=\"[&quot;investigation&quot;, &quot;detection&quot;, &quot;notification&quot;]\" />\n      <cacao:property name=\"playbook_activities\" value=\"[&quot;enrich&quot;, &quot;validate&quot;, &quot;notify&quot;, &quot;document&quot;]\" />\n      <cacao:property name=\"playbook_processing_summary\" value=\"[&quot;Enrich suspicious indicators via external intelligence&quot;, &quot;Assess confidence and escalation need&quot;, &quot;Notify stakeholders when escalation is required&quot;]\" />\n      <cacao:property name=\"workflow_start\" value=\"start--ti-enrichment\" />\n      <cacao:property name=\"created\" value=\"2026-04-21T08:00:00Z\" />\n      <cacao:property name=\"modified\" value=\"2026-04-21T08:45:00Z\" />\n      <cacao:property name=\"created_by\" value=\"identity--bbbbbbbb-cccc-4ddd-8eee-ffffffffffff\" />\n      <cacao:property name=\"valid_from\" value=\"2026-04-21T00:00:00Z\" />\n      <cacao:property name=\"valid_until\" value=\"2027-04-21T00:00:00Z\" />\n      <cacao:property name=\"revoked\" value=\"false\" />\n      <cacao:property name=\"derived_from\" value=\"[&quot;playbook--11111111-aaaa-4bbb-8ccc-000000000001&quot;]\" />\n      <cacao:property name=\"labels\" value=\"[&quot;synthetic&quot;, &quot;threat-intel&quot;, &quot;escalation&quot;]\" />\n      <cacao:property name=\"markings\" value=\"[&quot;marking-definition--tlp-green&quot;]\" />\n      <cacao:property name=\"industry_sectors\" value=\"[&quot;healthcare&quot;, &quot;information-technology&quot;]\" />\n    </bpmn:extensionElements>\n    <bpmn:startEvent id=\"StartEvent_start_ti_enrichment\" name=\"Start Enrichment\">\n      <bpmn:documentation>Entry point for indicator enrichment.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"start--ti-enrichment\" />\n        <cacao:property name=\"cacao_step_type\" value=\"start\" />\n      </bpmn:extensionElements>\n    </bpmn:startEvent>\n    <bpmn:task id=\"Task_action_query_threat_api\" name=\"Query Threat API\">\n      <bpmn:documentation>Query an external threat intelligence source.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--query-threat-api\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"delay\" value=\"PT5S\" />\n        <cacao:property name=\"timeout\" value=\"PT2M\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;ioc_value&quot;, &quot;ioc_type&quot;, &quot;tlp_default&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;confidence_score&quot;, &quot;matched_campaign&quot;, &quot;recommended_channel&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;api_request_id&quot;, &quot;request_datatype&quot;]\" />\n        <cacao:property name=\"markings\" value=\"[&quot;marking-definition--tlp-green&quot;]\" />\n        <cacao:property name=\"step_extensions\" value=\"[&quot;triage_score&quot;]\" />\n        <cacao:property name=\"agent\" value=\"group--soc-tier2\" />\n        <cacao:property name=\"targets\" value=\"[&quot;http-api--threatfeed&quot;, &quot;linux--mail-gateway&quot;, &quot;security-category--phishing&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:exclusiveGateway id=\"Gateway_if_condition_requires_escalation\" name=\"Escalation Required?\">\n      <bpmn:documentation>Check whether the enrichment result requires escalation.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"if-condition--requires-escalation\" />\n        <cacao:property name=\"cacao_step_type\" value=\"if-condition\" />\n        <cacao:property name=\"delay\" value=\"PT0S\" />\n        <cacao:property name=\"timeout\" value=\"PT30S\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;decision_basis&quot;]\" />\n        <cacao:property name=\"markings\" value=\"[&quot;marking-definition--tlp-green&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:exclusiveGateway>\n    <bpmn:task id=\"Task_playbook_action_notify_cert\" name=\"Call Escalation Notification Playbook\">\n      <bpmn:documentation>Trigger a notification playbook for the CERT and affected business unit.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"playbook-action--notify-cert\" />\n        <cacao:property name=\"cacao_step_type\" value=\"playbook-action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;ioc_value&quot;, &quot;confidence_score&quot;, &quot;preferred_channel&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;notification_status&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;notify_mode&quot;]\" />\n        <cacao:property name=\"agent\" value=\"organization--cert\" />\n        <cacao:property name=\"targets\" value=\"[&quot;organization--biz-unit&quot;]\" />\n        <cacao:property name=\"playbook_id\" value=\"playbook--notify-0001\" />\n        <cacao:property name=\"playbook_version\" value=\"1.2\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:task id=\"Task_action_document_escalation\" name=\"Document Escalation Decision\">\n      <bpmn:documentation>Document who was notified and why escalation was required.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--document-escalation\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;ioc_value&quot;, &quot;confidence_score&quot;, &quot;notification_status&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;case_summary&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;ticket_datatype&quot;, &quot;final_status&quot;]\" />\n        <cacao:property name=\"agent\" value=\"group--soc-tier2\" />\n        <cacao:property name=\"targets\" value=\"[&quot;organization--biz-unit&quot;, &quot;security-category--phishing&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_completed\" name=\"Close Enrichment Case\">\n      <bpmn:documentation>Normal end of the enrichment and triage process.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--completed\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_dd4bfc4b50f4425ca21ea4f61fc4c83e\" sourceRef=\"Task_action_document_escalation\" targetRef=\"EndEvent_end_completed\" />\n    <bpmn:sequenceFlow id=\"Flow_8c0ee50f90db4398bcd680931cf2f703\" sourceRef=\"Task_playbook_action_notify_cert\" targetRef=\"Task_action_document_escalation\" />\n    <bpmn:sequenceFlow id=\"Flow_eaf8ef06470148d2b1cf449ba6c6ad35\" sourceRef=\"Gateway_if_condition_requires_escalation\" targetRef=\"Task_playbook_action_notify_cert\" name=\"True\" />\n    <bpmn:task id=\"Task_action_record_low_priority\" name=\"Record Low Priority Finding\">\n      <bpmn:documentation>Document the finding as monitored and not escalated.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--record-low-priority\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;ioc_value&quot;, &quot;confidence_score&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;case_summary&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;final_status&quot;]\" />\n        <cacao:property name=\"agent\" value=\"group--soc-tier2\" />\n        <cacao:property name=\"targets\" value=\"[&quot;linux--mail-gateway&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:sequenceFlow id=\"Flow_d82a9df7ebe747149581ad4612d5a43a\" sourceRef=\"Task_action_record_low_priority\" targetRef=\"EndEvent_end_completed\" />\n    <bpmn:sequenceFlow id=\"Flow_3f0a18488f8d41ac855a5a2017089cf0\" sourceRef=\"Gateway_if_condition_requires_escalation\" targetRef=\"Task_action_record_low_priority\" name=\"False\" />\n    <bpmn:sequenceFlow id=\"Flow_04c4a6c471b9431ba669a6aaa5e263e1\" sourceRef=\"Task_action_query_threat_api\" targetRef=\"Gateway_if_condition_requires_escalation\" name=\"Success\" />\n    <bpmn:task id=\"Task_action_record_enrichment_failure\" name=\"Record Enrichment Failure\">\n      <bpmn:documentation>Document that the enrichment request failed and hand the case to manual review.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"action--record-enrichment-failure\" />\n        <cacao:property name=\"cacao_step_type\" value=\"action\" />\n        <cacao:property name=\"in_args\" value=\"[&quot;ioc_value&quot;, &quot;ioc_type&quot;]\" />\n        <cacao:property name=\"out_args\" value=\"[&quot;case_summary&quot;]\" />\n        <cacao:property name=\"step_variables\" value=\"[&quot;final_status&quot;]\" />\n        <cacao:property name=\"agent\" value=\"group--soc-tier2\" />\n        <cacao:property name=\"targets\" value=\"[&quot;http-api--threatfeed&quot;, &quot;linux--mail-gateway&quot;]\" />\n      </bpmn:extensionElements>\n    </bpmn:task>\n    <bpmn:endEvent id=\"EndEvent_end_workflow_exception\" name=\"Workflow Exception\">\n      <bpmn:documentation>Fallback end point for unrecoverable enrichment issues.</bpmn:documentation>\n      <bpmn:extensionElements>\n        <cacao:property name=\"cacao_step_id\" value=\"end--workflow-exception\" />\n        <cacao:property name=\"cacao_step_type\" value=\"end\" />\n      </bpmn:extensionElements>\n    </bpmn:endEvent>\n    <bpmn:sequenceFlow id=\"Flow_40fba76c6d554c6fa222913f0ee5eb1a\" sourceRef=\"Task_action_record_enrichment_failure\" targetRef=\"EndEvent_end_workflow_exception\" />\n    <bpmn:sequenceFlow id=\"Flow_e051f6e4b99e4a73ab7dca33ba5e84d0\" sourceRef=\"Task_action_query_threat_api\" targetRef=\"Task_action_record_enrichment_failure\" name=\"Failure\" />\n    <bpmn:sequenceFlow id=\"Flow_ea21734c35234faa8f7901d045973572\" sourceRef=\"StartEvent_start_ti_enrichment\" targetRef=\"Task_action_query_threat_api\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_a052df95fefd43e5a2faa497dcf3e60f\">\n      <bpmn:text>META: id=playbook--22222222-3333-4444-8555-666666666666; name=TI Enrichment and Escalation Demo\n      description=Synthetic context-heavy playbook for metadata, auth, agents, targets, markings and\nvariables with a simple workflow.; spec_version=cacao-2.0; playbook_types=investigation, detection,\nnotification\n      playbook_activities=enrich, validate, notify, document; processing=Enrich suspicious indicators\nvia external intelligence, Assess confidence and escalation need, Notify stakeholders when escalation is\nrequired\n      created=2026-04-21T08:00:00Z; modified=2026-04-21T08:45:00Z; valid_from=2026-04-21T00:00:00Z;\nvalid_until=2027-04-21T00:00:00Z; workflow_start=start--ti-enrichment\n      created_by=identity--bbbbbbbb-cccc-4ddd-8eee-ffffffffffff; revoked=False;\nderived_from=playbook--11111111-aaaa-4bbb-8ccc-000000000001; labels=synthetic, threat-intel, escalation\n      industry_sectors=healthcare, information-technology; variables=ioc_value, ioc_type,\nconfidence_score, escalation_required, preferred_channel, tlp_default, ... (+2 more)\n      authentication=Threat API Basic Auth [http-basic] (username=ti-reader), Notification API OAuth2\n[oauth2] (grant_type=client-credentials); marking_refs=marking-definition--tlp-green\n      data_markings=TLP:GREEN [TLP=green]; extensions=triage-score-extension (type=property-extension;\nversion=1.0; schema=https://example.org/schema/triage-sco...)\n      signatures=RS256 (algorithm=RS256; issuer=Example CERT); external_references=2</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_814e513ee45344b9b98f73e597746c80\" sourceRef=\"StartEvent_start_ti_enrichment\" targetRef=\"TextAnnotation_a052df95fefd43e5a2faa497dcf3e60f\" />\n    <bpmn:textAnnotation id=\"TextAnnotation_eb612478a019447eb91bfe944c590e40\">\n      <bpmn:text>META: delay=PT5S; timeout=PT2M; markings=marking-definition--tlp-green\nDATA: commands=http-api:GET /v1/indicator/lookup?value=${ioc_value}&amp;typ...,\n      command_auth[0]=auth-info--http-basic, in_args=ioc_value, ioc_type, tlp_default,\n      out_args=confidence_score, matched_campaign, recommended_channel, variables=api_request_id,\n      request_datatype, extensions=triage_score, authentication=Threat API Basic Auth [http-basic]\n      (username=ti-reader)\nROLE: agent=SOC Tier 2; type=group; targets=External Threat Feed API; type=http-api,\n      mail-gateway-01; type=linux-system, Phishing; type=security-category; category=phishing</bpmn:text>\n    </bpmn:textAnnotation>\n    <bpmn:association id=\"Association_b4dbe0aa6b1d4812899923e0edc2ce3a\" sourceRef=\"Task_action_query_threat_api\" tar     const titleText = "Example 2.bpmn";
    document.getElementById('title').textContent = titleText;

    const modeler = new BpmnJS({
      container: '#canvas'
    });

    const errorEl = document.getElementById('error');

    function download(filename, data, type) {
      const blob = new Blob([data], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function openDiagram(xml) {
      errorEl.textContent = '';
      try {
        await modeler.importXML(xml);
        modeler.get('canvas').zoom('fit-viewport', 'auto');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not open BPMN diagram.';
      }
    }

    document.getElementById('fitBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom('fit-viewport', 'auto');
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(1);
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      modeler.get('zoomScroll').stepZoom(-1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      modeler.get('canvas').zoom(1.0);
    });

    document.getElementById('handBtn').addEventListener('click', () => {
      modeler.get('handTool').activateMove();
    });

    document.getElementById('saveXmlBtn').addEventListener('click', async () => {
      try {
        const { xml } = await modeler.saveXML({ format: true });
        download('diagram.bpmn', xml, 'application/xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save BPMN XML.';
      }
    });

    document.getElementById('saveSvgBtn').addEventListener('click', async () => {
      try {
        const { svg } = await modeler.saveSVG();
        download('diagram.svg', svg, 'image/svg+xml');
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not save SVG.';
      }
    });

    openDiagram(initialXml);
  </script>
